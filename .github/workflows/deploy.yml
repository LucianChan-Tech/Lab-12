name: Deploy to AWS Lightsail

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH - test connection
        env:
          SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
          USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          echo "=== Write SSH key ==="
          echo "$SSH_KEY" > /tmp/key.pem
          chmod 600 /tmp/key.pem
          echo "=== Test SSH connection (expected: SSH_CONNECTED) ==="
          ssh -v -o StrictHostKeyChecking=accept-new -o KexAlgorithms=+sntrup761x25519-sha512@openssh.com -i /tmp/key.pem ${USER}@${HOST} "echo SSH_CONNECTED" 2>&1
          echo "=== SSH test done ==="
