name: Deploy to AWS Lightsail

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          SSH_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          SSH_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          echo "=== Debug: User=[$SSH_USER] Host=[$SSH_HOST] ==="
          echo "$SSH_KEY" > /tmp/key.pem
          chmod 600 /tmp/key.pem
          ssh -v -o StrictHostKeyChecking=accept-new -o KexAlgorithms=+sntrup761x25519-sha512@openssh.com -i /tmp/key.pem ${SSH_USER}@${SSH_HOST} "echo SSH_CONNECTED" 2>&1
          echo "=== Deploying ==="
          ssh -o StrictHostKeyChecking=accept-new -o KexAlgorithms=+sntrup761x25519-sha512@openssh.com -i /tmp/key.pem ${SSH_USER}@${SSH_HOST} "cd ~/personal-portfolio && git pull origin main && docker compose up -d --build" 2>&1
